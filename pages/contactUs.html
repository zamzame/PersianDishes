<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <header id="header"></header>
    <main>
        <section class="contactUs">
            <section class="contactForm">
                <form>
                    <label for="name">Name:</label><br>
                    <input type="text" id="name" name="name" placeholder="Your name e.g. Aman Aghajani"><br><br>

                    <label for="email">Email</label><br>
                    <input type="email" id="email" name="email" placeholder="Your email@example.com"><br><br>
                    
                    <label for="message">Message</label><br>
                    <textarea id="message" name="message" placeholder="Tell us what's in your mind..."></textarea><br><br>
                    <div class="submitBtn">
                        <button type="submit">Submit</button><br>     
                    </div>           
                </form>
            </section>
            <section class="contactInfo">
                <section class="infos">
                    <span></span>
                    <span></span>
                    <span></span>
                </section>
                <section class="talkTo">
                    <span></span>
                </section>
                <section class="thankYou">
                    <span></span>
                </section>
            </section>
        </section>
    </main>
</body>
